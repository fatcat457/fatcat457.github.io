<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fatcat457 | смешнявки</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: monospace;
    font-size: 1rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-top: 20px;
    font-weight: normal;
    font-size: 1.1rem;
  }
  .filelist {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .filelist a {
    color: #fff;
    text-decoration: none;
    padding: 4px 12px;
    border: 1px solid #444;
    display: inline-block;
    transition: .2s;
  }
  .filelist a:hover {
    border-color: #fff;
    background: #fff;
    color: #000;
  }
  .back {
    margin-top: 40px;
  }
  .back a {
    color: #888;
    font-size: .85rem;
    text-decoration: none;
  }
  .back a:hover {
    color: #fff;
  }
</style>
</head>
<body>
  <h1>~/smeshno/</h1>
  <div class="filelist" id="files"></div>
  <div class="back"><a href="../index.html">[назад]</a></div>

<script>
const files = [
  "vid_etolegko.mp4",
  "vid_doctor-myasnykov.mp4",
];
const container = document.getElementById('files');
files.forEach(f => {
  const a = document.createElement('a');
  a.href = f;
  a.textContent = f;
  container.appendChild(a);
});
</script>
</body>
</html>
